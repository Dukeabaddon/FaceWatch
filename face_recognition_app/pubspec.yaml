name: face_recognition_app
description: "Local facial recognition experiment app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  google_mlkit_face_mesh_detection: ^0.4.2
  tflite_flutter: ^0.12.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  image: ^4.2.0
  permission_handler: ^11.4.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/models/mobilefacenet.tflite
